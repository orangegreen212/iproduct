<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Trainer — Revenue · Product · Data</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f10; --bg2: #18181b; --bg3: #222226; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0efe8; --text2: #9b9a95; --text3: #5a5a56; --accent: #7c6af7; --accent-soft: rgba(124,106,247,0.15); --red: #f87171; --red-soft: rgba(248,113,113,0.12); --radius: 10px; --radius-sm: 6px; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }
  .layout { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
  .nav-item { padding: 10px; cursor: pointer; border-radius: var(--radius-sm); color: var(--text2); display: flex; align-items: center; gap: 10px; }
  .nav-item:hover, .nav-item.active { background: var(--bg3); color: var(--text); }
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
  .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 500px; margin: 20px 0; }
  .cat-card { background: var(--bg2); padding: 15px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; }
  .cat-card.selected { border-color: var(--accent); background: var(--accent-soft); }
  .session-screen { display: none; flex-direction: column; height: 100%; }
  .q-card { margin: 20px; padding: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
  .controls { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg2); }
  .mic-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .mic-btn.recording { background: var(--red-soft); color: var(--red); }
  textarea { flex: 1; background: var(--bg3); color: white; padding: 10px; border-radius: 5px; border: 1px solid var(--border); }
  button { padding: 10px 20px; background: var(--accent); border: none; color: white; border-radius: 5px; cursor: pointer; }
  .feedback-wrap { padding: 20px; display: none; overflow-y: auto; }
  .feedback-wrap.visible { display: block; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div style="font-weight:bold; margin-bottom:20px;">Interview Trainer</div>
    <div class="nav-item active" onclick="setCategory('all')" id="nav-all">⚡ All (<span id="cnt-all">0</span>)</div>
    <div class="nav-item" onclick="setCategory('sql')" id="nav-sql">🗄 SQL</div>
    <div class="nav-item" onclick="setCategory('product')" id="nav-product">💡 Product</div>
    <div class="nav-item" onclick="setCategory('behavioral')" id="nav-behavioral">🎯 Behavioral</div>
  </div>
  <div class="main">
    <div id="start-screen" class="start-screen">
      <h1>Ready to practice?</h1>
      <div class="category-grid" id="cat-grid"></div>
      <button onclick="startSession()">Start session →</button>
    </div>
    <div id="session-screen" class="session-screen">
      <div class="q-card"><h3 id="q-text">Loading...</h3></div>
      <div id="feedback-wrap" class="feedback-wrap"></div>
      <div class="controls">
        <div class="mic-btn" id="mic-btn" onclick="toggleMic()">🎙</div>
        <textarea id="answer-input" placeholder="Type or use mic..."></textarea>
        <button id="submit-btn" onclick="submitAnswer()">Evaluate</button>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  { id:1, type:'sql', level:'junior', en:'Find 7-day conversion rate.', framework:'SQL', steps:['Grain','Event','Logic'], hint:'Define grain.' },
  { id:13, type:'product', level:'junior', en:'Revenue dropped 18%. Investigate.', framework:'VDSHV', steps:['Validate','Decompose'], hint:'Revenue = T * C * AOV' },
  { id:23, type:'behavioral', level:'junior', en:'Tell me about a mistake you made.', framework:'STAR', steps:['Situation','Action'], hint:'Be honest.' }
  // ВСТАВЬТЕ СЮДА ВЕСЬ ВАШ МАССИВ ИЗ 30 ВОПРОСОВ
];

let state = { category: 'all', currentQ: null, isRecording: false, recognition: null, currentTranscript: '' };

function init() { updateCounts(); }

function setCategory(c) { 
  state.category = c; 
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+c).classList.add('active');
}

function startSession() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('session-screen').style.display = 'flex';
  loadQuestion();
}

function loadQuestion() {
  const pool = state.category === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.type === state.category);
  state.currentQ = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('q-text').textContent = state.currentQ.en;
  document.getElementById('feedback-wrap').classList.remove('visible');
}

function toggleMic() {
  if (state.isRecording) { stopRecording(); } else { startRecording(); }
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert('No support');
  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.onresult = (e) => {
    let t = '';
    for(let i=e.resultIndex; i<e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('answer-input').value = t;
  };
  rec.start();
  state.recognition = rec;
  state.isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
}

function stopRecording() {
  state.recognition.stop();
  state.isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
}

async function submitAnswer() {
  const answer = document.getElementById('answer-input').value;
  const res = await fetch('/api/feedback', {
    method: 'POST',
    body: JSON.stringify({ contents: [{ parts: [{ text: `Eval: ${state.currentQ.en}. Ans: ${answer}` }] }] })
  });
  const data = await res.json();
  const fw = document.getElementById('feedback-wrap');
  fw.innerHTML = data.candidates[0].content.parts[0].text;
  fw.classList.add('visible');
}

function updateCounts() { /* ... код ... */ }
init();
</script>
</body>
</html>
