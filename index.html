<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f10; --bg2: #18181b; --bg3: #222226; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0efe8; --text2: #9b9a95; --text3: #5a5a56; --accent: #7c6af7; --accent-soft: rgba(124,106,247,0.15); --radius: 10px; --radius-sm: 6px; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }
  .layout { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 20px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; color: var(--text2); border-radius: var(--radius-sm); }
  .nav-item:hover, .nav-item.active { background: var(--bg3); color: var(--text); }
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
  .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
  .cat-card { background: var(--bg2); padding: 20px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; }
  .cat-card.selected { border-color: var(--accent); background: var(--accent-soft); }
  .session-screen { display: none; flex-direction: column; height: 100%; }
  .q-card { margin: 20px; padding: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
  .controls { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  textarea { flex: 1; background: var(--bg3); color: white; padding: 10px; border-radius: 5px; }
  button { padding: 10px 20px; background: var(--accent); border: none; color: white; border-radius: 5px; cursor: pointer; }
  .feedback-wrap { padding: 20px; display: none; }
  .feedback-wrap.visible { display: block; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div style="font-weight:bold; margin-bottom:20px;">Interview Trainer</div>
    <div class="nav-item active" onclick="setCategory('all')" id="nav-all">⚡ All (<span id="cnt-all">0</span>)</div>
    <div class="nav-item" onclick="setCategory('sql')" id="nav-sql">🗄 SQL (<span id="cnt-sql">0</span>)</div>
    <div class="nav-item" onclick="setCategory('product')" id="nav-product">💡 Product (<span id="cnt-product">0</span>)</div>
    <div class="nav-item" onclick="setCategory('behavioral')" id="nav-behavioral">🎯 Behavioral (<span id="cnt-behavioral">0</span>)</div>
  </div>
  <div class="main">
    <div id="start-screen" class="start-screen">
      <h1>Ready to practice?</h1>
      <div class="category-grid">
        <div class="cat-card selected" id="cat-all" onclick="selectCat('all')">All</div>
        <div class="cat-card" id="cat-sql" onclick="selectCat('sql')">SQL</div>
        <div class="cat-card" id="cat-product" onclick="selectCat('product')">Product</div>
        <div class="cat-card" id="cat-behavioral" onclick="selectCat('behavioral')">Behavioral</div>
      </div>
      <button onclick="startSession()">Start session →</button>
    </div>
    <div id="session-screen" class="session-screen">
      <div class="q-card">
        <h3 id="q-text">Loading...</h3>
      </div>
      <div id="feedback-wrap" class="feedback-wrap"></div>
      <div class="controls">
        <textarea id="answer-input" placeholder="Type your answer..."></textarea>
        <button id="submit-btn" onclick="submitAnswer()">Evaluate</button>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  { id:1, type:'sql', en:'Find the 7-day conversion rate.', framework:'SQL', steps:['Grain','Event','Logic'], hint:'Define grain.' },
  { id:13, type:'product', en:'Revenue dropped 18%. Investigate.', framework:'VDSHV', steps:['Validate','Decompose'], hint:'Revenue = T * C * AOV' },
  { id:23, type:'behavioral', en:'Tell me about a mistake you made.', framework:'STAR', steps:['Situation','Action'], hint:'Be honest.' }
  // ... (здесь весь ваш список из 30 вопросов)
];

let state = { category: 'all', currentQ: null };

function setCategory(c) {
  state.category = c;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+c).classList.add('active');
  updateCounts();
}

function selectCat(c) {
  state.category = c;
  document.querySelectorAll('.cat-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('cat-'+c).classList.add('selected');
}

function startSession() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('session-screen').style.display = 'flex';
  loadQuestion();
}

function loadQuestion() {
  const pool = state.category === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.type === state.category);
  state.currentQ = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('q-text').textContent = state.currentQ.en;
}

async function submitAnswer() {
  const answer = document.getElementById('answer-input').value;
  const res = await fetch('/api/feedback', {
    method: 'POST',
    body: JSON.stringify({ contents: [{ parts: [{ text: `Evaluate: ${state.currentQ.en}. Answer: ${answer}` }] }] })
  });
  const data = await res.json();
  const text = data.candidates[0].content.parts[0].text;
  const fw = document.getElementById('feedback-wrap');
  fw.innerHTML = text;
  fw.classList.add('visible');
}

function updateCounts() {
  ['all','sql','product','behavioral'].forEach(c => {
    const count = c === 'all' ? QUESTIONS.length : QUESTIONS.filter(q => q.type === c).length;
    document.getElementById('cnt-'+c).textContent = count;
  });
}

updateCounts();
</script>
</body>
</html>
