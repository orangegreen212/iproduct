<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Trainer</title>
<style>
  /* Стили ваши, оставлены как есть */
  :root { --bg: #0f0f10; --bg2: #18181b; --accent: #7c6af7; --text: #f0efe8; --text2: #9b9a95; --red: #f87171; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; }
  .hidden { display: none; }
  .layout { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
  .sidebar { background: var(--bg2); padding: 20px; }
  .main { padding: 40px; }
  .mic-btn { width: 50px; height: 50px; background: #333; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .mic-btn.recording { background: var(--red); }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h3>Interview Trainer</h3>
    <div onclick="setCategory('all')">⚡ All</div>
    <div onclick="setCategory('sql')">🗄 SQL</div>
  </div>
  <div class="main">
    <div id="start-screen">
      <h1>Ready?</h1>
      <button onclick="startSession()">Start session →</button>
    </div>
    <div id="session-screen" class="hidden">
      <h3 id="q-text">Loading...</h3>
      <div id="feedback-wrap"></div>
      <div style="display:flex; gap:10px;">
        <div class="mic-btn" id="mic-btn" onclick="toggleMic()">🎙</div>
        <textarea id="answer-input"></textarea>
        <button onclick="submitAnswer()">Evaluate</button>
      </div>
    </div>
  </div>
</div>

<script>
// 1. МАССИВ ВОПРОСОВ
const QUESTIONS = [
  { id:1, type:'sql', en:'Find the 7-day conversion rate.', framework:'SQL', steps:['Grain','Event','Logic'], hint:'Define grain.' },
  { id:13, type:'product', en:'Revenue dropped 18%. Investigate.', framework:'VDSHV', steps:['Validate','Decompose'], hint:'Revenue = T * C * AOV' },
  { id:23, type:'behavioral', en:'Tell me about a mistake you made.', framework:'STAR', steps:['Situation','Action'], hint:'Be honest.' }
  // ... (ЗДЕСЬ ДОЛЖНЫ БЫТЬ ВСЕ ВАШИ 30 ВОПРОСОВ)
];

// 2. СОСТОЯНИЕ
let state = { category: 'all', currentQ: null, isRecording: false, recognition: null };

// 3. ВСЕ ФУНКЦИИ (объявлены заранее)
function setCategory(c) { state.category = c; }

function startSession() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('session-screen').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  state.currentQ = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
  document.getElementById('q-text').textContent = state.currentQ.en;
  if(typeof updateHistoryPanel === 'function') updateHistoryPanel();
}

function toggleMic() {
  if (state.isRecording) {
    state.recognition.stop();
    state.isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
  } else {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    state.recognition = new SpeechRecognition();
    state.recognition.onresult = (e) => document.getElementById('answer-input').value = e.results[0][0].transcript;
    state.recognition.start();
    state.isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
  }
}

async function submitAnswer() {
  const answer = document.getElementById('answer-input').value;
  const res = await fetch('/api/feedback', { 
    method: 'POST', 
    body: JSON.stringify({ contents: [{ parts: [{ text: answer }] }] }) 
  });
  const data = await res.json();
  document.getElementById('feedback-wrap').innerHTML = data.candidates[0].content.parts[0].text;
  document.getElementById('feedback-wrap').style.display = 'block';
}

// ЗАГЛУШКИ, ЧТОБЫ НЕ БЫЛО ОШИБОК
function updateHistoryPanel() { console.log("History updated"); }
function updateCounts() {}
function updateStats() {}
function showStart() {}
function resetProgress() {}
function autoResize() {}
function handleEnter() {}
function renderQuestion() {}
function renderFramework() {}
function resetFeedback() {}
function init() {}

init();
</script>
</body>
</html>
