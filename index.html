<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Trainer — Revenue · Product · Data</title>
    <style>
        /* ВАШИ СТИЛИ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0f0f10; --bg2: #18181b; --bg3: #222226; --border: rgba(255,255,255,0.08); --text: #f0efe8; --text2: #9b9a95; --text3: #5a5a56; --accent: #7c6af7; --red: #f87171; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; }
        .layout { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
        .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 20px; }
        .main { display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        .mic-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-btn.recording { background: var(--red); }
        .feedback-wrap { padding: 20px; display: none; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div onclick="setCategory('all')" class="nav-item">⚡ All</div>
            <div onclick="setCategory('sql')" class="nav-item">🗄 SQL</div>
        </div>
        <div class="main" id="main-area">
            <div id="start-screen" class="start-screen">
                <h1>Ready?</h1>
                <button onclick="startSession()">Start session →</button>
            </div>
            <div id="session-screen" class="hidden">
                <h3 id="q-text">Loading...</h3>
                <div id="feedback-wrap" class="feedback-wrap"></div>
                <div class="controls">
                    <div class="mic-btn" id="mic-btn" onclick="toggleMic()">🎙</div>
                    <textarea id="answer-input"></textarea>
                    <button onclick="submitAnswer()">Evaluate</button>
                </div>
            </div>
        </div>
    </div>

<script>
// 1. МАССИВ
const QUESTIONS = [
  // SQL / PYTHON
  { id:1, type:'sql', level:'junior', en:'Find the 7-day conversion rate for users. Explain your logic step by step without writing code.', uk:'Знайди 7-денну конверсію для користувачів. Поясни логіку крок за кроком без коду.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'Start: "First, I need to define grain — user-level or order-level?"' },
  { id:2, type:'sql', level:'junior', en:'Calculate average order value per user for the last 30 days. Walk me through your SQL logic.', uk:'Порахуй середній чек на користувача за останні 30 днів. Поясни SQL логіку.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'Think: SUM(revenue) / COUNT(orders) or per-user aggregation?' },
  { id:3, type:'sql', level:'junior', en:'Write a funnel analysis: signup → login → first purchase. How would you calculate step-by-step conversion rates?', uk:'Воронка: реєстрація → логін → перша покупка. Як порахуєш конверсію кожного кроку?', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'Think: GROUP BY step, COUNT DISTINCT users at each step' },
  { id:4, type:'sql', level:'junior', en:'Find Day-7 retention. What tables do you need and what is your logic?', uk:'Знайди retention на день 7. Які таблиці потрібні і яка логіка?', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'Cohort logic: MIN(event_date) per user, then check if active on day 7' },
  { id:5, type:'sql', level:'middle', en:'You have users and events tables. Find users who made a second purchase within 30 days of their first purchase.', uk:'Таблиці users та events. Знайди юзерів, які зробили другу покупку впродовж 30 днів після першої.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'Sequencing problem → ROW_NUMBER() per user, then LAG or self-join' },
  { id:6, type:'sql', level:'middle', en:'Two dashboards show different revenue numbers for the same month. How would you debug this SQL issue?', uk:'Два дашборди показують різний дохід за один місяць. Як дебажиш SQL?', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'Check: grain difference, filter differences, date truncation, JOIN duplicates' },
  { id:7, type:'sql', level:'middle', en:'Calculate MoM revenue growth rate by channel. Explain aggregation and window function logic.', uk:'Порахуй MoM зростання доходу по каналах. Поясни логіку агрегації та window function.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'DATE_TRUNC + LAG(revenue) OVER (PARTITION BY channel ORDER BY month)' },
  { id:8, type:'sql', level:'middle', en:'Find the top 3 revenue-generating products per country. Handle ties correctly.', uk:'Знайди топ-3 продукти за доходом по кожній країні. Правильно оброби однакові значення.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'RANK() vs DENSE_RANK() vs ROW_NUMBER() — which handles ties correctly?' },
  { id:9, type:'sql', level:'junior', en:'How would you detect duplicate rows in a dataset and remove them? Explain your approach.', uk:'Як знайти дублікати в датасеті та видалити їх? Поясни підхід.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'ROW_NUMBER() OVER (PARTITION BY key_cols ORDER BY date) — keep rn = 1' },
  { id:10, type:'sql', level:'middle', en:'Design a cohort retention table in Python with pandas. What steps would you follow?', uk:'Побудуй cohort retention таблицю в Python з pandas. Які кроки?', framework:'Python Pipeline', steps:['Load & inspect','Clean data','Define cohort','Calculate metric','Visualize'], hint:'Steps: parse dates → assign cohort_month → pivot table → divide by cohort size' },
  { id:11, type:'sql', level:'middle', en:'Explain how you would run an A/B test analysis in Python. What statistical test and why?', uk:'Як провести A/B тест аналіз у Python? Який статистичний тест і чому?', framework:'Python Pipeline', steps:['Load & inspect','Clean data','Define cohort','Calculate metric','Visualize'], hint:'t-test for means, chi-square for proportions — state your H0 and significance level' },
  { id:12, type:'sql', level:'junior', en:'You need to analyze revenue by device type and country. Walk through your Python/SQL approach.', uk:'Аналіз доходу по типу пристрою та країні. Поясни підхід Python/SQL.', framework:'SQL Thinking', steps:['Define grain','Identify event','Choose method','Build logic','Business answer'], hint:'GROUP BY device, country — think about NULL handling and sorting' },

  // PRODUCT CASES
  { id:13, type:'product', level:'junior', en:'Revenue dropped 18% week-over-week. Traffic is stable. Walk me through your investigation.', uk:'Дохід впав на 18% тиждень до тижня. Трафік стабільний. Поясни розслідування.', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Revenue = Traffic × Conversion × AOV. Traffic is stable → focus on CR and AOV' },
  { id:14, type:'product', level:'junior', en:'Conversion rate dropped from 5% to 3.8%. No product releases reported. What do you do?', uk:'Конверсія впала з 5% до 3.8%. Релізів не було. Що робиш?', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Segment by device, browser, country, acquisition channel. Check error logs.' },
  { id:15, type:'product', level:'junior', en:'Traffic increased 30% but revenue stayed flat. Explain what happened.', uk:'Трафік виріс на 30%, а дохід залишився незмінним. Поясни що сталося.', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Traffic quality issue? Bot traffic? Lower-intent users? AOV drop? Discount spike?' },
  { id:16, type:'product', level:'junior', en:'Monthly churn increased from 4% to 7%. How would you investigate?', uk:'Місячний churn виріс з 4% до 7%. Як розслідуєш?', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Segment by cohort, plan type, acquisition channel, usage level' },
  { id:17, type:'product', level:'middle', en:'Revenue increased but churn also increased after a pricing change. What is your analysis?', uk:'Після зміни цін дохід виріс, але churn теж виріс. Який твій аналіз?', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Trade-off analysis: who pays more? who leaves? short-term vs long-term revenue' },
  { id:18, type:'product', level:'junior', en:'A newly built dashboard has only 10% adoption after 2 months. Why and what do you do?', uk:'Новий дашборд має лише 10% adoption через 2 місяці. Чому і що робиш?', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'5 barrier types: Awareness, Relevance, Usability, Trust, Substitution' },
  { id:19, type:'product', level:'middle', en:'AOV increased but total revenue decreased. Explain possible reasons and your plan.', uk:'Середній чек виріс, але загальний дохід впав. Поясни причини та план.', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Volume dropped more than AOV increased. Why did order count fall?' },
  { id:20, type:'product', level:'middle', en:'After a checkout redesign: add-to-cart is stable, but checkout completion dropped 15%. What do you do?', uk:'Після редизайну checkout: add-to-cart стабільний, але завершення checkout впало на 15%. Що робиш?', framework:'VDSHV', steps:['Validate','Decompose','Segment','Hypothesize','Validate hyp.'], hint:'Segment by device, payment method. Check UX changes, error rates, performance.' },
  { id:21, type:'product', level:'middle', en:'How would you measure the success of a new onboarding flow?', uk:'Як виміряєш успішність нового onboarding flow?', framework:'Metrics Framework', steps:['Clarify goal','Primary metric','Feature metrics','Guardrail metrics','Decision'], hint:'Goal → Primary metric → Feature adoption → Guardrail (churn, NPS)' },
  { id:22, type:'product', level:'middle', en:'How would you increase revenue by 20% in the next quarter? What levers would you pull?', uk:'Як збільшити дохід на 20% за наступний квартал? Які важелі?', framework:'MECE Revenue', steps:['Acquisition','Retention','Expansion','Prioritize','Recommend'], hint:'Revenue = Acquisition + Retention + Expansion. Which has highest ROI?' },

  // BEHAVIORAL
  { id:23, type:'behavioral', level:'junior', en:'Tell me about a time you made a mistake in your analysis or reporting.', uk:'Розкажи про помилку в аналізі або звітності.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Show: identified root cause → fixed process → prevented recurrence' },
  { id:24, type:'behavioral', level:'junior', en:'Tell me about a time when your analysis changed a business decision.', uk:'Розкажи коли твій аналіз змінив бізнес-рішення.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Quantify the impact. What was the decision before vs after your analysis?' },
  { id:25, type:'behavioral', level:'junior', en:'Describe a disagreement with a stakeholder about data or metrics.', uk:'Опиши незгоду зі стейкхолдером щодо даних або метрик.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Show: validated first, found mismatch type, aligned on definitions, created source of truth' },
  { id:26, type:'behavioral', level:'junior', en:'Tell me about a time you had to explain a complex analysis to a non-technical audience.', uk:'Розкажи як пояснював складний аналіз нетехнічній аудиторії.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Adapted communication level, used visuals, focused on business impact not methodology' },
  { id:27, type:'behavioral', level:'middle', en:'Tell me about your greatest impact on a business metric.', uk:'Розкажи про найбільший вплив на бізнес-метрику.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Be specific: what metric, by how much, over what timeframe' },
  { id:28, type:'behavioral', level:'middle', en:'Describe a time you had to work with incomplete or messy data. What did you do?', uk:'Опиши ситуацію з неповними або брудними даними. Що робив?', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Show: validated assumptions, documented limitations, communicated uncertainty to stakeholders' },
  { id:29, type:'behavioral', level:'middle', en:'Tell me about a project where you had to balance speed vs accuracy in your analysis.', uk:'Проект де треба було балансувати швидкість і точність аналізу.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Show decision-making: context of urgency, what you traded off, what you communicated' },
  { id:30, type:'behavioral', level:'middle', en:'Describe a situation where you proactively identified a problem before it was reported.', uk:'Ситуація де ти проактивно знайшов проблему до того як її повідомили.', framework:'STAR', steps:['Situation','Task','Action','Result'], hint:'Show: monitoring habit, pattern recognition, escalation path, business impact prevented' },
];

// 2. СОСТОЯНИЕ
let state = { category: 'all', currentQ: null, isRecording: false, recognition: null };

// 3. ФУНКЦИИ
function setCategory(c) { state.category = c; }

function startSession() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('session-screen').style.display = 'flex';
    loadQuestion();
}

function loadQuestion() {
    state.currentQ = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    document.getElementById('q-text').textContent = state.currentQ.en;
}

function toggleMic() {
    if (state.isRecording) {
        state.recognition.stop();
        state.isRecording = false;
        document.getElementById('mic-btn').classList.remove('recording');
    } else {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        state.recognition = new SpeechRecognition();
        state.recognition.onresult = (e) => document.getElementById('answer-input').value = e.results[0][0].transcript;
        state.recognition.start();
        state.isRecording = true;
        document.getElementById('mic-btn').classList.add('recording');
    }
}

async function submitAnswer() {
    const answer = document.getElementById('answer-input').value;
    const res = await fetch('/api/feedback', { 
        method: 'POST', 
        body: JSON.stringify({ contents: [{ parts: [{ text: answer }] }] }) 
    });
    const data = await res.json();
    const fw = document.getElementById('feedback-wrap');
    fw.innerHTML = data.candidates[0].content.parts[0].text;
    fw.style.display = 'block';
}

// 4. ЗАЩИТА ОТ БЕЛОГО ЭКРАНА
window.onload = () => {
    console.log("App ready");
    // Здесь можно вызвать init, если он нужен
};
</script>
</body>
</html>
